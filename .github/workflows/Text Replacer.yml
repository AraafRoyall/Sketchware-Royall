name: Replace Lines by Number

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - apply

      file_input:
        description: "File name OR full path"
        required: true

      lines:
        description: "Lines (e.g. 10 or 10-12 or 10,20)"
        required: true

      new_content:
        description: "New content (can be multi-line)"
        required: true

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve file
        run: |
          INPUT="${{ github.event.inputs.file_input }}"

          if [ -f "$INPUT" ]; then
            FILE="$INPUT"
          else
            MATCHES=$(find . -type f -name "$INPUT")
            COUNT=$(echo "$MATCHES" | grep -c .)

            if [ "$COUNT" -eq 0 ]; then
              echo "❌ No file found"
              exit 1
            elif [ "$COUNT" -gt 1 ]; then
              echo "⚠️ Multiple files found:"
              echo "$MATCHES" | nl
              echo "👉 Use full path"
              exit 1
            else
              FILE="$MATCHES"
            fi
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Build sed expression
        run: |
          INPUT="${{ github.event.inputs.lines }}"
          NEW="${{ github.event.inputs.new_content }}"

          SED_EXPR=""

          IFS=',' read -ra PARTS <<< "$INPUT"
          for part in "${PARTS[@]}"; do
            if [[ "$part" == *"-"* ]]; then
              START=$(echo $part | cut -d'-' -f1)
              END=$(echo $part | cut -d'-' -f2)
              SED_EXPR="${SED_EXPR}${START},${END}c\\$NEW\n"
            else
              SED_EXPR="${SED_EXPR}${part}c\\$NEW\n"
            fi
          done

          echo "SED_EXPR<<EOF" >> $GITHUB_ENV
          echo "$SED_EXPR" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Preview changes
        if: ${{ github.event.inputs.mode == 'preview' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          echo "🔍 Preview (before → after)"
          echo "--------------------------------"

          echo "📄 Original:"
          nl -ba "$FILE" | sed -n '1,200p'

          echo "--------------------------------"

          echo "✏️ After replacement:"
          sed "$SED_EXPR" "$FILE" | nl -ba | sed -n '1,200p'

          echo "--------------------------------"
          echo "✅ Preview mode (no changes applied)"

      - name: Apply replacement
        if: ${{ github.event.inputs.mode == 'apply' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          TMP=$(mktemp)
          sed "$SED_EXPR" "$FILE" > "$TMP"
          mv "$TMP" "$FILE"

      - name: Commit & Push
        if: ${{ github.event.inputs.mode == 'apply' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Replace lines in ${{ env.FILE }}"
            git push
          fi