name: Import Single PR/Commit → One Branch

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PR or Commit URL"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Checkout base branch
        run: |
          BASE="${{ github.event.repository.default_branch }}"
          git checkout $BASE
          git pull origin $BASE

      - name: Create new branch
        run: |
          BRANCH="import-${{ github.run_number }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Apply URL (Force Mode)
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "Processing: $URL"

          OWNER=$(echo $URL | cut -d'/' -f4)
          REPO=$(echo $URL | cut -d'/' -f5)

          git remote remove external 2>/dev/null || true
          git remote add external https://github.com/$OWNER/$REPO.git
          git fetch external

          if [[ "$URL" == *"/commit/"* ]]; then
            ID=$(echo $URL | cut -d'/' -f7)

            echo "Trying cherry-pick..."
            git cherry-pick -X theirs $ID || {
              echo "Cherry-pick failed → fallback to patch"

              git cherry-pick --abort || true

              git fetch external $ID
              git show $ID | git apply --reject --whitespace=fix || true

              git add .
              git commit -m "force import commit $ID"
            }

          elif [[ "$URL" == *"/pull/"* ]]; then
            ID=$(echo $URL | cut -d'/' -f7)

            git fetch external pull/$ID/head:external-pr

            echo "Merging PR with override..."
            git merge -X theirs external-pr --allow-unrelated-histories || {
              echo "Merge failed → force commit"

              git merge --abort || true
              git reset --hard
              git pull origin $BASE

              git merge -X theirs external-pr --allow-unrelated-histories || true

              git add .
              git commit -m "force import PR $ID"
            }
          fi

      - name: Push branch
        run: |
          git push origin $BRANCH