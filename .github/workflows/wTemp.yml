name: Scan Firebase Usage

on:
workflow_dispatch:

jobs:
scan:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Scan Firebase / Google usage
    run: |
      echo "---- Firebase / Google usage ----"
      grep -rnE "Firebase|google_app_id|default_web_client_id|com.google.firebase|com.google.android.gms" .

  - name: Scan for google-services.json
    run: |
      echo "---- google-services.json ----"
      find . -name "google-services.json"

  - name: Scan manifest meta-data
    run: |
      echo "---- Manifest Firebase meta-data ----"
      grep -rn "com.google.firebase" app/src/main