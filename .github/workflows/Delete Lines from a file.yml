name: Lines Deleter

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select mode"
        required: true
        default: "Preview"
        type: choice
        options:
          - Preview
          - Delete

      file_path:
        description: "File Path"
        required: true

      lines:
        description: "Lines to delete (10,20,10-20)"
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate file
        run: |
          FILE="${{ github.event.inputs.file_path }}"

          if [ ! -f "$FILE" ]; then
            echo "❌ File not found: $FILE"
            exit 1
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Build sed expression
        run: |
          INPUT="${{ github.event.inputs.lines }}"
          SED_EXPR=""

          IFS=',' read -ra PARTS <<< "$INPUT"
          for part in "${PARTS[@]}"; do
            if [[ "$part" == *"-"* ]]; then
              START=$(echo $part | cut -d'-' -f1)
              END=$(echo $part | cut -d'-' -f2)
              SED_EXPR="${SED_EXPR}${START},${END}d;"
            else
              SED_EXPR="${SED_EXPR}${part}d;"
            fi
          done

          echo "SED_EXPR=$SED_EXPR" >> $GITHUB_ENV
          echo "Expression: $SED_EXPR"

      - name: Preview changes
        if: ${{ github.event.inputs.mode == 'Preview' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          echo "🔍 Preview (lines to be removed):"
          echo "--------------------------------"

          sed -n "$(echo $SED_EXPR | sed 's/d/p/g')" "$FILE"

          echo "--------------------------------"
          echo "✅ Preview mode (no changes applied)"

      - name: Apply Delete
        if: ${{ github.event.inputs.mode == 'Delete' }}
        run: |
          FILE="${{ env.FILE }}"
          SED_EXPR="${{ env.SED_EXPR }}"

          sed -i "$SED_EXPR" "$FILE"

      - name: Commit & Push
        if: ${{ github.event.inputs.mode == 'Delete' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "No changes"
          else
            git add .
            git commit -m "Delete lines from ${{ env.FILE }}"
            git push
          fi