name: Import PR/Commit → Branch Only (Strict Full Incoming)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "GitHub PR or Commit URL"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # -------------------------------
      # PARSE URL
      # -------------------------------
      - name: Parse URL
        id: parse
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.url }}"

          OWNER=$(echo $URL | cut -d'/' -f4)
          REPO=$(echo $URL | cut -d'/' -f5)

          if [[ "$URL" == *"/pull/"* ]]; then
            TYPE="pr"
            ID=$(echo $URL | cut -d'/' -f7)
          elif [[ "$URL" == *"/commit/"* ]]; then
            TYPE="commit"
            ID=$(echo $URL | cut -d'/' -f7)
          else
            echo "❌ Invalid URL"
            exit 1
          fi

          BRANCH="import-${TYPE}-${ID}"

          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # -------------------------------
      # SYNC BASE
      # -------------------------------
      - name: Sync base
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          git checkout $BASE
          git pull origin $BASE

      # -------------------------------
      # ADD REMOTE
      # -------------------------------
      - name: Add external repo
        run: |
          set -euo pipefail
          git remote remove external 2>/dev/null || true
          git remote add external https://github.com/${{ steps.parse.outputs.owner }}/${{ steps.parse.outputs.repo }}.git
          git fetch external

      # -------------------------------
      # PREPARE BRANCH
      # -------------------------------
      - name: Prepare branch
        run: |
          set -euo pipefail

          BR="${{ steps.parse.outputs.branch }}"

          if git ls-remote --exit-code --heads origin "$BR"; then
            echo "Reusing branch"
            git checkout "$BR"
            git pull origin "$BR"
          else
            git checkout -b "$BR"
          fi

      # -------------------------------
      # SKIP IF ALREADY IMPORTED
      # -------------------------------
      - name: Skip if already imported
        id: skipcheck
        run: |
          set -euo pipefail

          if git log --grep="Imported .*: ${{ steps.parse.outputs.id }}" --oneline | grep .; then
            echo "already=true" >> $GITHUB_OUTPUT
            echo "⏭️ Already imported"
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------------
      # APPLY FULL INCOMING SNAPSHOT
      # -------------------------------
      - name: Apply full incoming snapshot
        if: steps.skipcheck.outputs.already == 'false'
        run: |
          set -euo pipefail

          if [ "${{ steps.parse.outputs.type }}" = "pr" ]; then
            git fetch external pull/${{ steps.parse.outputs.id }}/head:incoming
          else
            git fetch external ${{ steps.parse.outputs.id }}:incoming
          fi

          # Force full replacement with incoming
          git checkout incoming -- .

          # Remove files not present in incoming
          git clean -fd

          git add -A
          git commit -m "Imported ${{ steps.parse.outputs.type }}: ${{ steps.parse.outputs.id }} (full incoming)"

      # -------------------------------
      # CHECK REAL CONFLICT MARKERS ONLY
      # -------------------------------
      - name: Ensure no conflict markers (strict)
        if: steps.skipcheck.outputs.already == 'false'
        run: |
          set -euo pipefail

          FILES=$(find . -type f \
            \( -name "*.xml" -o -name "*.java" -o -name "*.kt" -o -name "*.gradle" \))

          if [ -z "$FILES" ]; then
            echo "No source files"
            exit 0
          fi

          echo "Scanning for conflict markers..."

          if grep -H "<<<<<<< " $FILES; then
            echo "❌ Conflict marker found"
            exit 1
          fi

          if grep -H ">>>>>>> " $FILES; then
            echo "❌ Conflict marker found"
            exit 1
          fi

          echo "✅ Clean"

      # -------------------------------
      # XML VALIDATION
      # -------------------------------
      - name: Validate XML
        if: steps.skipcheck.outputs.already == 'false'
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y libxml2-utils

          find . -name "*.xml" -print0 | xargs -0 -n1 xmllint --noout

          echo "✅ XML valid"

      # -------------------------------
      # PUSH
      # -------------------------------
      - name: Push branch
        if: steps.skipcheck.outputs.already == 'false'
        run: |
          set -euo pipefail
          git push origin ${{ steps.parse.outputs.branch }}